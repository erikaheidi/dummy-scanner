name: Scan PR

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: head/go.mod

      - name: Run tests
        id: tests
        run: |
          TEST_OUTPUT=$(go test -v ./... 2>&1) && TEST_STATUS="✅ All tests passed" || TEST_STATUS="❌ Some tests failed"
          echo "status=${TEST_STATUS}" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "output<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$TEST_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
        working-directory: head

      - name: Build dummy scanner
        run: go build -o dummy-scanner ./main.go
        working-directory: head

      - name: Scan base branch
        id: scan_base
        run: |
          TOTAL_FILES=$(head/dummy-scanner -s base)
          echo "total_files=${TOTAL_FILES}" >> "$GITHUB_OUTPUT"

      - name: Scan PR branch and post comment
        env:
          DUMMY_API_TOKEN: ${{ secrets.DUMMY_API_TOKEN }}
          DUMMY_TOKEN_SECRET: ${{ secrets.DUMMY_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_COUNT: ${{ steps.scan_base.outputs.total_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          TEST_OUTPUT: ${{ steps.tests.outputs.output }}
        run: |
          TOTAL_FILES=$(head/dummy-scanner -s head)
          echo "Scan complete. Total files found: ${TOTAL_FILES}"

          BASE=${BASE_COUNT:-0}
          PR=${TOTAL_FILES}
          DIFF=$((PR - BASE))

          if [ "$DIFF" -gt 0 ]; then
            DIFF_LABEL="+${DIFF} files added"
            DIFF_ICON="📈"
          elif [ "$DIFF" -lt 0 ]; then
            ABS_DIFF=$(( -DIFF ))
            DIFF_LABEL="${ABS_DIFF} files removed"
            DIFF_ICON="📉"
          else
            DIFF_LABEL="No change in file count"
            DIFF_ICON="✅"
          fi

          BODY=$(jq -n \
            --arg base "$BASE" \
            --arg pr "$PR" \
            --arg label "$DIFF_LABEL" \
            --arg icon "$DIFF_ICON" \
            --arg base_ref "${{ github.event.pull_request.base.ref }}" \
            --arg head_ref "${{ github.event.pull_request.head.ref }}" \
            --arg test_status "$TEST_STATUS" \
            --arg test_output "$TEST_OUTPUT" \
            '{ body: ("## Dummy Scanner Results\n\n| Branch | Total Files |\n|--------|-------------|\n| Base (`" + $base_ref + "`) | " + $base + " |\n| PR (`" + $head_ref + "`) | " + $pr + " |\n\n" + $icon + " **" + $label + "**\n\n### Test Results\n\n" + $test_status + "\n\n<details>\n<summary>Test output</summary>\n\n```\n" + $test_output + "\n```\n\n</details>") }')

          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments"

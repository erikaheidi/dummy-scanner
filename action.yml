name: 'Dummy Scanner'
description: 'Scans a directory and counts the total number of files. Useful for scanning PRs to get a quick overview of the repository size.'
inputs:
  directory:
    description: 'Directory to scan (relative to the repository root)'
    required: false
    default: '.'
outputs:
  total_files:
    description: 'Total number of files found by the scanner'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.directory }}
